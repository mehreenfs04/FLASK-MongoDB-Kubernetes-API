apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  selector:
    app: flask
  ports:
    - protocol: TCP
      port: 80        # The port you will use in the browser/Postman
      targetPort: 5000 # The port your Python container is listening on
  type: LoadBalancer   # Or NodePort, if you are using Minikube