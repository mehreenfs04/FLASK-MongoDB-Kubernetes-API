apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: bookstore-flask:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        # --- ADD THIS SECTION BELOW ---
        env:
        - name: MONGO_URI
          value: "mongodb://admin:admin@mongodb-service:27017/BOOKSTORE?authSource=admin"
